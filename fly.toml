# fly.toml app configuration file generated for found-haikus on 2026-05-18T02:04:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'found-haikus'
primary_region = 'ewr'

[build]

[env]
  FEEDGEN_DB_PATH = '/data/haiku.db'

[[mounts]]
  source = 'haiku_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    path = '/.well-known/did.json'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024
